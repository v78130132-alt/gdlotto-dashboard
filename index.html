<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GD Lotto 4D Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--neon:#a855f7;--neon2:#c084fc;--bg:#0f0a1a;--card:#1a1025;--card2:#241535;--border:#2d1f45;--text:#e2d9f3;--muted:#9b8bb8;--green:#22c55e;--red:#ef4444;--gold:#fbbf24;--silver:#94a3b8;--bronze:#d97706}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:16px}
h1{text-align:center;font-size:1.8rem;background:linear-gradient(135deg,var(--neon),var(--neon2),#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.subtitle{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:20px}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:.85rem;transition:all .2s}
.tab:hover{border-color:var(--neon);color:var(--text)}
.tab.active{background:linear-gradient(135deg,rgba(168,85,247,.3),rgba(192,132,252,.2));border-color:var(--neon);color:#fff;box-shadow:0 0 12px rgba(168,85,247,.3)}
.panel{display:none}.panel.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card:hover{border-color:rgba(168,85,247,.4);box-shadow:0 0 20px rgba(168,85,247,.1)}
.card h3{color:var(--neon2);font-size:1rem;margin-bottom:8px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600;margin-left:6px}
.badge-freq{background:rgba(239,68,68,.2);color:#f87171}
.badge-gap{background:rgba(251,191,36,.2);color:#fbbf24}
.badge-pattern{background:rgba(34,197,94,.2);color:#4ade80}
.desc{color:var(--muted);font-size:.78rem;margin-bottom:10px}
.numbers{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.num{background:linear-gradient(135deg,#2d1f45,#1a1025);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-family:'Courier New',monospace;font-weight:700;font-size:1rem;color:#e2d9f3;text-align:center;min-width:56px;transition:all .2s}
.num:hover{border-color:var(--neon);box-shadow:0 0 10px rgba(168,85,247,.4);transform:translateY(-2px)}
.confidence{margin-top:8px;display:flex;align-items:center;gap:8px;font-size:.8rem}
.conf-bar{flex:1;height:6px;background:#1a1025;border-radius:3px;overflow:hidden}
.conf-fill{height:100%;border-radius:3px;transition:width .5s}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stat-val{font-size:1.6rem;font-weight:700;background:linear-gradient(135deg,var(--neon),var(--neon2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{color:var(--muted);font-size:.75rem;margin-top:4px}
.prize{display:flex;align-items:center;gap:10px;padding:6px 0}
.prize-label{font-size:.75rem;font-weight:600;min-width:28px}
.prize-num{font-family:'Courier New',monospace;font-weight:700;font-size:1.1rem;padding:4px 12px;border-radius:6px;border:1px solid}
.gold .prize-num{color:var(--gold);border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.1)}
.silver .prize-num{color:var(--silver);border-color:rgba(148,163,184,.3);background:rgba(148,163,184,.1)}
.bronze .prize-num{color:var(--bronze);border-color:rgba(217,119,6,.3);background:rgba(217,119,6,.1)}
.special-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.special-num{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-family:'Courier New',monospace;font-size:.85rem;color:var(--muted)}
.freq-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(45,31,69,.5)}
.freq-num{font-family:'Courier New',monospace;font-weight:700;min-width:50px;font-size:.95rem}
.freq-bar{flex:1;height:8px;background:#1a1025;border-radius:4px;overflow:hidden}
.freq-fill{height:100%;border-radius:4px}
.freq-fill.hot{background:linear-gradient(90deg,#ef4444,#f97316)}
.freq-fill.cold{background:linear-gradient(90deg,#3b82f6,#06b6d4)}
.freq-count{color:var(--muted);font-size:.8rem;min-width:30px;text-align:right}
.section-title{color:var(--neon2);font-size:.9rem;font-weight:600;margin:12px 0 8px;display:flex;align-items:center;gap:6px}
table{width:100%;border-collapse:collapse;font-size:.82rem}
th{color:var(--muted);text-align:left;padding:8px 6px;border-bottom:1px solid var(--border);font-weight:600;font-size:.75rem;text-transform:uppercase}
td{padding:8px 6px;border-bottom:1px solid rgba(45,31,69,.3)}
.match-badge{background:rgba(34,197,94,.2);color:#4ade80;padding:2px 6px;border-radius:4px;font-size:.7rem;font-weight:600}
.no-match{color:var(--muted);font-size:.75rem}
.page-nav{display:flex;justify-content:center;gap:8px;margin-top:12px}
.page-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;font-size:.8rem}
.page-btn:hover{border-color:var(--neon)}
.page-btn:disabled{opacity:.4;cursor:default}
.page-btn.active{background:rgba(168,85,247,.3);border-color:var(--neon)}
.page-info{color:var(--muted);font-size:.8rem;text-align:center;margin-top:8px}
.loading{text-align:center;padding:40px;color:var(--muted)}
.glow{animation:glow 2s ease-in-out infinite alternate}
@keyframes glow{from{text-shadow:0 0 5px rgba(168,85,247,.5)}to{text-shadow:0 0 20px rgba(168,85,247,.8)}}
@media(max-width:600px){.container{padding:10px}h1{font-size:1.4rem}.numbers{gap:6px}.num{min-width:48px;font-size:.9rem;padding:5px 8px}}
</style>
</head>
<body>
<div class="container">
<h1 class="glow">🎰 GD Lotto 4D Dashboard</h1>
<p class="subtitle">AI-Powered Predictions & Analysis</p>

<div id="stats" class="stats-grid"></div>

<div class="tabs">
  <div class="tab active" onclick="showTab('predictions')">🔮 Predictions</div>
  <div class="tab" onclick="showTab('results')">🏆 Latest Results</div>
  <div class="tab" onclick="showTab('analysis')">📊 Analysis</div>
  <div class="tab" onclick="showTab('history')">📜 Results History</div>
  <div class="tab" onclick="showTab('pred-history')">🎯 Prediction History</div>
</div>

<div id="predictions" class="panel active"></div>
<div id="results" class="panel"></div>
<div id="analysis" class="panel"></div>
<div id="history" class="panel"></div>
<div id="pred-history" class="panel"></div>
</div>

<script>
let DATA = null;
let historyPage = 0;
const PAGE_SIZE = 20;

async function loadData() {
  try {
    const r = await fetch('data.json?' + Date.now());
    DATA = await r.json();
    render();
  } catch(e) {
    document.querySelector('.container').innerHTML += '<p class="loading">Failed to load data. Please try again later.</p>';
  }
}

function showTab(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function confColor(v) {
  if (v >= 0.7) return 'var(--green)';
  if (v >= 0.5) return 'var(--gold)';
  return 'var(--red)';
}

function strategyInfo(name) {
  if (name.includes('Hot') || name.includes('Frequency')) return { icon: '🔥', badge: 'badge-freq', cat: 'Frequency', desc: 'Picks numbers appearing most often in recent draws' };
  if (name.includes('Overdue') || name.includes('Reverse')) return { icon: '⏰', badge: 'badge-gap', cat: 'Gap-Based', desc: 'Finds numbers that haven\'t appeared in a long time' };
  if (name.includes('Markov') || name.includes('Positional')) return { icon: '🧮', badge: 'badge-pattern', cat: 'Pattern', desc: 'Analyzes digit position probabilities using pattern chains' };
  return { icon: '🎲', badge: 'badge-freq', cat: 'Mixed', desc: 'Combined strategy' };
}

function render() {
  if (!DATA) return;

  // Stats
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-val">${DATA.total_draws}</div><div class="stat-label">Total Draws</div></div>
    <div class="stat-card"><div class="stat-val">${DATA.total_predictions}</div><div class="stat-label">Predictions</div></div>
    <div class="stat-card"><div class="stat-val">${DATA.total_comparisons}</div><div class="stat-label">Comparisons</div></div>
    <div class="stat-card"><div class="stat-val">${DATA.last_updated}</div><div class="stat-label">Last Updated</div></div>
  `;

  renderPredictions();
  renderResults();
  renderAnalysis();
  renderHistory();
  renderPredHistory();
}

function renderPredictions() {
  const el = document.getElementById('predictions');
  if (!DATA.predictions.length) { el.innerHTML = '<div class="card"><p style="color:var(--muted)">No predictions yet. First predictions will appear after the daily update.</p></div>'; return; }
  
  // Group by target date
  const grouped = {};
  DATA.predictions.forEach(p => {
    if (!grouped[p.target_date]) grouped[p.target_date] = [];
    grouped[p.target_date].push(p);
  });

  let html = '';
  for (const [date, preds] of Object.entries(grouped)) {
    html += `<div class="section-title">🎯 Predictions for ${date}</div>`;
    preds.forEach(p => {
      const info = strategyInfo(p.strategy_name);
      const nums = p.predicted_numbers.split(',');
      const conf = p.confidence_score;
      html += `<div class="card">
        <h3>${info.icon} ${p.strategy_name} <span class="badge ${info.badge}">${info.cat}</span></h3>
        <div class="desc">${info.desc}</div>
        <div class="confidence"><span>Confidence: ${(conf*100).toFixed(0)}%</span><div class="conf-bar"><div class="conf-fill" style="width:${conf*100}%;background:${confColor(conf)}"></div></div></div>
        <div class="numbers">${nums.map(n => `<div class="num">${n}</div>`).join('')}</div>
      </div>`;
    });
  }
  el.innerHTML = html;
}

function renderResults() {
  const el = document.getElementById('results');
  if (!DATA.latest_draw) { el.innerHTML = '<div class="card"><p style="color:var(--muted)">No results yet.</p></div>'; return; }
  const d = DATA.latest_draw;
  const specials = ['special_a','special_b','special_c','special_d','special_e','special_f','special_g','special_h','special_i','special_j','special_k','special_l','special_m'].map(k => d[k]).filter(Boolean);
  const consolations = ['consolation_n','consolation_o','consolation_p','consolation_q','consolation_r','consolation_s','consolation_t','consolation_u','consolation_v','consolation_w'].map(k => d[k]).filter(Boolean);

  el.innerHTML = `<div class="card">
    <h3>🏆 Draw: ${d.draw_date}</h3>
    <div class="prize gold"><span class="prize-label">1st</span><span class="prize-num">${d.prize_1st}</span></div>
    <div class="prize silver"><span class="prize-label">2nd</span><span class="prize-num">${d.prize_2nd}</span></div>
    <div class="prize bronze"><span class="prize-label">3rd</span><span class="prize-num">${d.prize_3rd}</span></div>
    ${specials.length ? `<div class="section-title">⭐ Special</div><div class="special-grid">${specials.map(n=>`<span class="special-num">${n}</span>`).join('')}</div>` : ''}
    ${consolations.length ? `<div class="section-title">🎫 Consolation</div><div class="special-grid">${consolations.map(n=>`<span class="special-num">${n}</span>`).join('')}</div>` : ''}
  </div>`;
}

function renderAnalysis() {
  const el = document.getElementById('analysis');
  const maxHot = DATA.hot_numbers.length ? DATA.hot_numbers[0].count : 1;
  const maxCold = DATA.cold_numbers.length ? Math.max(...DATA.cold_numbers.map(n=>n.count), 1) : 1;

  let html = '<div class="card"><h3>🔥 Hot Numbers (Most Frequent)</h3>';
  DATA.hot_numbers.forEach(n => {
    html += `<div class="freq-item"><span class="freq-num" style="color:#f87171">${n.number}</span><div class="freq-bar"><div class="freq-fill hot" style="width:${(n.count/maxHot)*100}%"></div></div><span class="freq-count">${n.count}</span></div>`;
  });
  html += '</div><div class="card"><h3>❄️ Cold Numbers (Least Frequent)</h3>';
  DATA.cold_numbers.forEach(n => {
    html += `<div class="freq-item"><span class="freq-num" style="color:#38bdf8">${n.number}</span><div class="freq-bar"><div class="freq-fill cold" style="width:${(n.count/maxCold)*100}%"></div></div><span class="freq-count">${n.count}</span></div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function renderHistory() {
  const el = document.getElementById('history');
  const draws = DATA.draws_history;
  const totalPages = Math.ceil(draws.length / PAGE_SIZE);
  const start = historyPage * PAGE_SIZE;
  const page = draws.slice(start, start + PAGE_SIZE);

  let html = `<div class="card"><h3>📜 All ${draws.length} Draw Results</h3>
    <table><thead><tr><th>Date</th><th>1st 🥇</th><th>2nd 🥈</th><th>3rd 🥉</th></tr></thead><tbody>`;
  page.forEach(d => {
    html += `<tr><td>${d.draw_date}</td><td style="color:var(--gold);font-family:monospace;font-weight:700">${d.prize_1st}</td><td style="color:var(--silver);font-family:monospace;font-weight:700">${d.prize_2nd}</td><td style="color:var(--bronze);font-family:monospace;font-weight:700">${d.prize_3rd}</td></tr>`;
  });
  html += '</tbody></table>';
  html += `<div class="page-info">Page ${historyPage+1} of ${totalPages} (${draws.length} draws)</div>`;
  html += '<div class="page-nav">';
  html += `<button class="page-btn" onclick="changePage(-1)" ${historyPage===0?'disabled':''}>← Prev</button>`;
  html += `<button class="page-btn" onclick="changePage(1)" ${historyPage>=totalPages-1?'disabled':''}>Next →</button>`;
  html += '</div></div>';
  el.innerHTML = html;
}

function changePage(dir) {
  const totalPages = Math.ceil(DATA.draws_history.length / PAGE_SIZE);
  historyPage = Math.max(0, Math.min(totalPages-1, historyPage + dir));
  renderHistory();
}

function renderPredHistory() {
  const el = document.getElementById('pred-history');
  const preds = DATA.predictions;
  const comps = DATA.comparisons;

  let html = '';

  // Comparisons
  if (comps.length) {
    html += '<div class="card"><h3>🎯 Prediction vs Actual Results</h3><table><thead><tr><th>Date</th><th>Exact</th><th>Partial</th><th>Compared</th></tr></thead><tbody>';
    comps.forEach(c => {
      html += `<tr><td>${c.target_date}</td><td>${c.exact_matches > 0 ? `<span class="match-badge">${c.exact_matches} match${c.exact_matches>1?'es':''}</span>` : '<span class="no-match">0</span>'}</td><td>${c.partial_matches || 0}</td><td style="color:var(--muted);font-size:.75rem">${c.compared_at || '-'}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  // All predictions grouped by date
  const grouped = {};
  preds.forEach(p => {
    if (!grouped[p.target_date]) grouped[p.target_date] = [];
    grouped[p.target_date].push(p);
  });

  html += '<div class="card"><h3>📋 All Predictions</h3>';
  for (const [date, ps] of Object.entries(grouped)) {
    html += `<div class="section-title">📅 Target: ${date}</div>`;
    ps.forEach(p => {
      const info = strategyInfo(p.strategy_name);
      const nums = p.predicted_numbers.split(',');
      html += `<div style="margin-bottom:12px;padding:8px;background:var(--card2);border-radius:8px">
        <div style="font-size:.85rem;font-weight:600;color:var(--neon2)">${info.icon} ${p.strategy_name} <span class="badge ${info.badge}">${info.cat}</span></div>
        <div class="numbers" style="margin-top:6px">${nums.map(n => `<div class="num" style="font-size:.85rem;min-width:44px;padding:4px 8px">${n}</div>`).join('')}</div>
        <div style="font-size:.7rem;color:var(--muted);margin-top:4px">Confidence: ${(p.confidence_score*100).toFixed(0)}% · Created: ${p.created_at}</div>
      </div>`;
    });
  }
  if (!preds.length) html += '<p style="color:var(--muted)">No prediction history yet.</p>';
  html += '</div>';

  el.innerHTML = html;
}

loadData();
</script>
</body>
</html>
